version = "3.11.0"
runner.dialect = scala3
maxColumn = 100
lineEndings = unix
encoding = "UTF-8"

project.git = true
project.excludePaths = [
  "glob:**/target/**",
  "glob:**/.bloop/**",
  "glob:**/.metals/**",
  "glob:**/project/project/**",
  "glob:**/project/target/**"
]

align.preset = none
align.openParenCallSite = false
align.openParenDefnSite = false
assumeStandardLibraryStripMargin = true
danglingParentheses.preset = true
docstrings.style = Asterisk
docstrings.wrap = no
docstrings.removeEmpty = true
indent.main = 2
indent.callSite = 2
indent.defnSite = 4
includeCurlyBraceInSelectChains = true
includeNoParensInSelectChains = false

newlines.source = fold
newlines.implicitParamListModifierPrefer = before
newlines.afterCurlyLambdaParams = squash

fileOverride {
  "glob:**/*Endpoints.scala" {
    newlines.selectChains.style = unfold
  }
}

rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  PreferCurlyFors
]
rewrite.redundantBraces.parensForOneLineApply = true
rewrite.redundantBraces.stringInterpolation = true
rewrite.redundantBraces.maxBreaks = 1
rewrite.trailingCommas.style = multiple
rewrite.trailingCommas.allowFolding = true

# Scala 3 idiomatic syntax: control structures use `if x then` / `for ... do` etc.
# Optional braces are kept; we rely on scalafix `OrganizeImports` for import order.
rewrite.scala3.convertToNewSyntax = true
rewrite.scala3.removeOptionalBraces = no
