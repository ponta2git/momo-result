name: API

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  push:
    branches: [master, main]
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: summit
          POSTGRES_USER: summit
          POSTGRES_PASSWORD: summit
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Checkout momo-db migrations
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/momo-db
          path: _deps/momo-db
          token: ${{ secrets.MOMO_DB_READ_TOKEN || github.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: _deps/momo-db/pnpm-lock.yaml

      - name: Install momo-db dependencies
        timeout-minutes: 5
        run: pnpm --dir ../../_deps/momo-db install --frozen-lockfile

      - name: Apply momo-db migrations
        timeout-minutes: 5
        env:
          DIRECT_URL: postgres://summit:summit@localhost:5433/summit
        run: pnpm --dir ../../_deps/momo-db db:migrate:ci

      - name: Format check
        timeout-minutes: 5
        run: sbt scalafmtCheckAll

      - name: Lint check
        timeout-minutes: 5
        run: sbt "scalafixAll --check"

      - name: Clean compile
        timeout-minutes: 10
        run: sbt clean Test/compile

      - name: Test
        timeout-minutes: 10
        env:
          MOMO_RESULT_TEST_DATABASE_URL: jdbc:postgresql://localhost:5433/summit
          MOMO_RESULT_TEST_DB_USER: summit
          MOMO_RESULT_TEST_DB_PASSWORD: summit
        run: sbt test

      - name: DB quality gate
        timeout-minutes: 5
        env:
          MOMO_RESULT_TEST_DATABASE_URL: jdbc:postgresql://localhost:5433/summit
          MOMO_RESULT_TEST_DB_USER: summit
          MOMO_RESULT_TEST_DB_PASSWORD: summit
        run: sbt apiDbQuality

      - name: Redis quality gate
        timeout-minutes: 5
        run: sbt apiRedisQuality

      - name: OpenAPI generation check
        timeout-minutes: 5
        run: sbt apiOpenApiCheck
