name: API

on:
  workflow_call:
  pull_request:
    paths:
      - "apps/api/**"
      - "docs/schemas/**"
      - ".github/workflows/api.yml"

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout momo-db migrations
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/momo-db
          path: _deps/momo-db
          token: ${{ secrets.MOMO_DB_READ_TOKEN || github.token }}
          sparse-checkout: drizzle
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1.2.1

      - name: Format check
        timeout-minutes: 5
        run: sbt scalafmtCheckAll

      - name: Lint check
        timeout-minutes: 5
        run: sbt "scalafixAll --check"

      - name: Clean compile
        timeout-minutes: 10
        run: sbt clean Test/compile

      - name: OpenAPI generation check
        timeout-minutes: 5
        run: sbt apiOpenApiCheck

      - name: Test
        timeout-minutes: 10
        run: sbt test

      - name: DB quality gate
        timeout-minutes: 10
        env:
          MOMO_DB_MIGRATIONS_DIR: ../../_deps/momo-db/drizzle
        run: sbt apiDbQuality

      - name: Redis quality gate
        timeout-minutes: 5
        run: sbt apiRedisQuality

      - name: Coverage report
        timeout-minutes: 10
        run: sbt apiCoverageReportOnly
        continue-on-error: true

      - name: Summarize coverage
        if: always()
        timeout-minutes: 1
        run: |
          python3 ../../scripts/ci/write-coverage-summary.py api \
            --root ../.. \
            --out ../../coverage-summary/api \
            --allow-missing
          cat ../../coverage-summary/api/summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: |
            apps/api/target/scala-*/scoverage-report/
            apps/api/target/scala-*/coverage-report/
            coverage-summary/api/
          if-no-files-found: ignore
          retention-days: 30
