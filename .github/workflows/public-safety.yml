name: public-safety

on:
  workflow_call:
  pull_request:

permissions:
  contents: read

jobs:
  public-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check public repository safety
        run: scripts/ci/public-repo-safety-check.sh
