# Scalafix rules for the momo-result API.
#
# Goals:
#   1. Help AI/humans write correct, consistent Scala 3 code.
#   2. Make whole classes of bugs unrepresentable at the source level
#      (no nulls / no throws / no asInstanceOf / no Thread.sleep, etc.).
#
# Run:
#   sbt scalafixAll        # apply
#   sbt "scalafixAll --check"

rules = [
  DisableSyntax,
  RemoveUnused,
  LeakingImplicitClassVal,
  NoValInForComprehension,
  RedundantSyntax,
  OrganizeImports
]

DisableSyntax {
  noVars = true
  noThrows = true
  noReturns = true
  noNulls = true
  noAsInstanceOf = true
  noIsInstanceOf = true
  noDefaultArgs = true
  noFinalize = true
  noSemicolons = true
  noTabs = true
  noXml = true
  noValPatterns = true
  # `noUniversalEquality` is intentionally off: `-language:strictEquality`
  # already covers the cross-type cases. Banning `==`/`!=` outright would
  # be noisy without giving extra safety.

  regex = [
    {
      id = noPrintln
      pattern = "(^|[^.\\w])println\\s*\\("
      message = "Use the SLF4J logger instead of println."
    },
    {
      id = noStdoutErr
      pattern = "System\\.(out|err)"
      message = "Do not write to System.out / System.err. Use the SLF4J logger."
    },
    {
      id = noBlockingSleep
      pattern = "Thread\\.sleep\\s*\\("
      message = "Thread.sleep blocks the carrier thread; use IO.sleep / TestControl instead."
    },
    {
      id = noScalaAwait
      pattern = "scala\\.concurrent\\.Await"
      message = "Do not block on Future with Await; use Cats Effect IO."
    },
    {
      id = noUnsafeRunSync
      pattern = "\\.unsafeRunSync\\s*\\("
      message = "Do not call unsafeRunSync in production code; return IO and let the runtime run it."
    },
    {
      id = noTodoWithoutTicket
      pattern = "(?i)(?:TODO|FIXME)(?![^\\n]*#\\d+)"
      message = "TODO / FIXME must reference a ticket like #123."
    }
  ]
}

# Imports: stable, deterministic order so AI-generated edits do not churn diffs.
# Scala 3 dialect; do not remove unused imports (handled by -Wunused:all + -Werror).
OrganizeImports {
  targetDialect = Scala3
  removeUnused = false
  groupedImports = Merge
  importSelectorsOrder = SymbolsFirst
  groups = [
    "re:javax?\\."
    "scala."
    "*"
    "momo."
  ]
  blankLines = Auto
}
