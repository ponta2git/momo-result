name: deploy

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/ocr-worker/**"
      - "apps/web/**"
      - "deploy/**"
      - "scripts/ci/**"
      - "Dockerfile"
      - "fly.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy.yml"
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('runtime-smoke-pr-{0}', github.event.pull_request.number) || 'fly-deploy-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime-smoke:
    name: Runtime smoke and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: momo_result
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d momo_result"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/momo_result
      DEV_MEMBER_IDS: member_ponta,member_akane_mami,member_otaka,member_eu
      IMAGE_NAME: momo-result:${{ github.sha }}
      MOMO_DB_MIGRATIONS_DIR: _deps/momo-db/drizzle
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v5

      - name: Checkout momo-db migrations
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/momo-db
          path: _deps/momo-db
          token: ${{ secrets.MOMO_DB_READ_TOKEN || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Apply momo-db migrations
        run: scripts/ci/apply-momo-db-migrations.sh
        timeout-minutes: 5

      - name: Build runtime image
        run: docker build -t "${IMAGE_NAME}" .
        timeout-minutes: 45

      - name: Scan runtime image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Validate runtime executables
        run: |
          docker run --rm \
            -e MOMO_ORIGIN_LOCK_TOKEN=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
            "${IMAGE_NAME}" \
            /bin/sh -c '/opt/momo-result/bin/render-nginx-conf && nginx -t -c /etc/nginx/nginx.conf'
          docker run --rm "${IMAGE_NAME}" test -x /opt/momo-result/api/bin/momo-result-api
          docker run --rm "${IMAGE_NAME}" momo-ocr --help
          docker run --rm "${IMAGE_NAME}" python -c 'from momo_ocr.features.ocr_jobs.queue_contract import parse_job_message; parse_job_message({"schemaVersion":"1","jobId":"job-smoke","draftId":"draft-smoke","imageId":"image-smoke","imagePath":"/tmp/momo-result/uploads/image-smoke.png","requestedScreenType":"total_assets","attempt":"1","enqueuedAt":"2026-05-24T00:00:00Z"})'

      - name: Start runtime container
        run: |
          docker run -d \
            --name momo-result-runtime \
            --network host \
            -e APP_ENV=dev \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e DEV_MEMBER_IDS="${DEV_MEMBER_IDS}" \
            -e HTTP_HOST=127.0.0.1 \
            -e HTTP_PORT=8081 \
            -e IMAGE_TMP_DIR=/tmp/momo-result/uploads \
            -e MOMO_CANONICAL_HOST=momo-result.ponta.me \
            -e MOMO_LOG_FORMAT=json \
            -e MOMO_ORIGIN_LOCK_TOKEN=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
            -e REDIS_URL="${REDIS_URL}" \
            "${IMAGE_NAME}"
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs momo-result-runtime
          exit 1
        timeout-minutes: 3

      - name: Runtime HTTP smoke
        run: scripts/ci/runtime-smoke.sh
        env:
          MOMO_CANONICAL_HOST: momo-result.ponta.me
          MOMO_ORIGIN_LOCK_TOKEN: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        timeout-minutes: 2

      - name: Playwright E2E smoke
        run: pnpm --filter web e2e
        timeout-minutes: 10

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop runtime container
        if: always()
        run: docker rm -f momo-result-runtime || true

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: runtime-smoke
    if: github.event_name != 'pull_request'
    environment:
      name: production
      url: https://momo-result.ponta.me
    steps:
      - uses: actions/checkout@v5

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app momo-result
