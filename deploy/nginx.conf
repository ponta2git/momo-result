worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  server_tokens off;
  client_max_body_size 4m;
  map_hash_bucket_size 256;

  map "$uri:$status" $momo_access_loggable {
    default 1;
    "~^/healthz:200$" 0;
    "~^/assets/.*:(200|304)$" 0;
  }

  access_log /dev/stdout combined if=$momo_access_loggable;
  error_log /dev/stderr warn;

  upstream momo_api {
    server 127.0.0.1:8081;
    keepalive 16;
  }

  map $host $momo_host_allowed {
    default 0;
__MOMO_ALLOWED_HOST_MAP_ENTRIES__
  }

  map $host $momo_origin_lock_required {
    default 1;
__MOMO_OPTIONAL_ORIGIN_LOCK_HOST_MAP_ENTRIES__
  }

  map $http_x_momo_origin_lock $momo_origin_lock_allowed {
    default 0;
    __MOMO_ORIGIN_LOCK_TOKEN_VALUE__ 1;
  }

  map "$momo_origin_lock_required:$momo_origin_lock_allowed" $momo_origin_request_allowed {
    default 0;
    "0:0" 1;
    "0:1" 1;
    "1:1" 1;
  }

  server {
    listen 8080;
    root /srv/momo-result/web;
    index index.html;

    location = /healthz {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      proxy_pass http://momo_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location = /healthz/details {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      if ($momo_origin_request_allowed = 0) {
        return 421;
      }
      proxy_pass http://momo_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location = /openapi.yaml {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      return 404;
    }

    location ~ ^/api/match-drafts/[^/]+/source-images(?:\.zip|/[^/]+)$ {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      if ($momo_origin_request_allowed = 0) {
        return 421;
      }
      proxy_pass http://momo_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "private, no-store" always;
    }

    location /api/ {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      if ($momo_origin_request_allowed = 0) {
        return 421;
      }
      proxy_pass http://momo_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location ~ (^|/)\. {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      return 404;
    }

    location /assets/ {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      if ($momo_origin_request_allowed = 0) {
        return 421;
      }
      if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
      }
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    location / {
      if ($momo_host_allowed = 0) {
        return 421;
      }
      if ($momo_origin_request_allowed = 0) {
        return 421;
      }
      if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
      }
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
      add_header Cache-Control "no-cache" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
