name: deploy

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/ocr-worker/**"
      - "apps/web/**"
      - "deploy/**"
      - "docs/schemas/**"
      - "scripts/ci/**"
      - "Dockerfile"
      - ".dockerignore"
      - "fly.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy.yml"
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_ARTIFACT_NAME: runtime-image
  IMAGE_REF: registry.fly.io/momo-result:${{ github.sha }}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('runtime-smoke-pr-{0}', github.event.pull_request.number) || 'fly-deploy-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  public-safety:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/public-safety.yml

  api:
    needs: public-safety
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/api.yml
    secrets: inherit

  web:
    needs: public-safety
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/web.yml

  ocr-worker:
    needs: public-safety
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/ocr-worker.yml
    secrets: inherit

  runtime-smoke:
    name: Runtime smoke and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs:
      - public-safety
      - api
      - web
      - ocr-worker
    if: >-
      ${{
        always() &&
        (
          github.event_name == 'pull_request' ||
          (
            needs['public-safety'].result == 'success' &&
            needs.api.result == 'success' &&
            needs.web.result == 'success' &&
            needs['ocr-worker'].result == 'success'
          )
        )
      }}

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: momo_result
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d momo_result"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/momo_result
      DEV_MEMBER_IDS: member_ponta,member_akane_mami,member_otaka,member_eu
      MOMO_DB_MIGRATIONS_DIR: _deps/momo-db/drizzle
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout momo-db migrations
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/momo-db
          path: _deps/momo-db
          token: ${{ secrets.MOMO_DB_READ_TOKEN || github.token }}
          sparse-checkout: drizzle
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 5

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Check runtime config
        run: scripts/ci/check-runtime-config.sh
        timeout-minutes: 2

      - name: Apply momo-db migrations
        run: scripts/ci/apply-momo-db-migrations.sh
        timeout-minutes: 5

      - name: Build runtime image
        run: docker build -t "${IMAGE_REF}" .
        timeout-minutes: 45

      - name: Scan runtime image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Validate runtime executables
        run: |
          docker run --rm \
            -e MOMO_ORIGIN_LOCK_TOKEN=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
            "${IMAGE_REF}" \
            /bin/sh -c '/opt/momo-result/bin/render-nginx-conf && nginx -t -c /etc/nginx/nginx.conf'
          docker run --rm "${IMAGE_REF}" test -x /opt/momo-result/api/bin/momo-result-api
          docker run --rm "${IMAGE_REF}" momo-ocr --help
          docker run --rm "${IMAGE_REF}" python -c 'from momo_ocr.features.ocr_jobs.queue_contract import parse_job_message; parse_job_message({"schemaVersion":"1","jobId":"job-smoke","draftId":"draft-smoke","imageId":"image-smoke","imagePath":"/tmp/momo-result/uploads/image-smoke.png","requestedScreenType":"total_assets","attempt":"1","enqueuedAt":"2026-05-24T00:00:00Z"})'

      - name: Start runtime container
        run: |
          docker run -d \
            --name momo-result-runtime \
            --network host \
            -e APP_ENV=dev \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e DEV_MEMBER_IDS="${DEV_MEMBER_IDS}" \
            -e HTTP_HOST=127.0.0.1 \
            -e HTTP_PORT=8081 \
            -e IMAGE_TMP_DIR=/tmp/momo-result/uploads \
            -e MOMO_CANONICAL_HOST=momo-result.ponta.me \
            -e MOMO_LOG_FORMAT=json \
            -e MOMO_ORIGIN_LOCK_TOKEN=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef \
            -e REDIS_URL="${REDIS_URL}" \
            "${IMAGE_REF}"
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs momo-result-runtime
          exit 1
        timeout-minutes: 3

      - name: Runtime HTTP smoke
        run: scripts/ci/runtime-smoke.sh
        env:
          MOMO_CANONICAL_HOST: momo-result.ponta.me
          MOMO_ORIGIN_LOCK_TOKEN: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        timeout-minutes: 2

      - name: Playwright E2E smoke
        run: pnpm --filter web e2e:target
        timeout-minutes: 10

      - name: Record smoke-tested image metadata
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${IMAGE_ARTIFACT_NAME}"
          printf "%s\n" "${IMAGE_REF}" > "${IMAGE_ARTIFACT_NAME}/image-ref.txt"
          docker image inspect "${IMAGE_REF}" --format '{{.Id}}' > "${IMAGE_ARTIFACT_NAME}/image-id.txt"

      - name: Save smoke-tested image
        if: github.event_name != 'pull_request'
        run: docker save "${IMAGE_REF}" | gzip -1 > "${IMAGE_ARTIFACT_NAME}/momo-result-image.tar.gz"
        timeout-minutes: 10

      - name: Upload smoke-tested image
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_ARTIFACT_NAME }}/
          if-no-files-found: error
          retention-days: 3

      - name: Capture runtime container logs
        if: failure()
        run: docker logs momo-result-runtime > runtime-container.log 2>&1 || true

      - name: Upload runtime container logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-container-logs
          path: runtime-container.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop runtime container
        if: always()
        run: docker rm -f momo-result-runtime || true

  release-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs:
      - public-safety
      - api
      - web
      - ocr-worker
      - runtime-smoke
    if: github.event_name != 'pull_request'
    steps:
      - name: Confirm release gates
        run: echo "All release gates passed for ${IMAGE_REF}."

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: release-ready
    if: github.event_name != 'pull_request'
    environment:
      name: production
      url: https://momo-result.ponta.me
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download smoke-tested image
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.IMAGE_ARTIFACT_NAME }}
          path: ${{ env.IMAGE_ARTIFACT_NAME }}

      - name: Load smoke-tested image
        run: |
          expected_ref="$(cat "${IMAGE_ARTIFACT_NAME}/image-ref.txt")"
          if [ "${expected_ref}" != "${IMAGE_REF}" ]; then
            echo "Expected image ref ${expected_ref}, got ${IMAGE_REF}." >&2
            exit 1
          fi

          gunzip -c "${IMAGE_ARTIFACT_NAME}/momo-result-image.tar.gz" | docker load

          expected_id="$(cat "${IMAGE_ARTIFACT_NAME}/image-id.txt")"
          loaded_id="$(docker image inspect "${IMAGE_REF}" --format '{{.Id}}')"
          if [ "${loaded_id}" != "${expected_id}" ]; then
            echo "Loaded image id ${loaded_id} does not match smoke-tested id ${expected_id}." >&2
            exit 1
          fi
        timeout-minutes: 10

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Authenticate Docker to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl auth docker

      - name: Push smoke-tested image
        run: |
          docker push "${IMAGE_REF}"
          docker manifest inspect "${IMAGE_REF}" > "${IMAGE_ARTIFACT_NAME}/registry-manifest.json"
        timeout-minutes: 10

      - name: Upload pushed image manifest
        uses: actions/upload-artifact@v7
        with:
          name: runtime-image-registry-manifest
          path: ${{ env.IMAGE_ARTIFACT_NAME }}/registry-manifest.json
          if-no-files-found: error
          retention-days: 7

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --app momo-result --image "${IMAGE_REF}" --yes
