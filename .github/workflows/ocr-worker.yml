name: OCR worker

on:
  workflow_call:
  pull_request:
    paths:
      - "apps/ocr-worker/**"
      - "docs/schemas/**"
      - ".github/workflows/ocr-worker.yml"

permissions:
  contents: read

jobs:
  ocr-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/ocr-worker

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout momo-db migrations
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/momo-db
          path: _deps/momo-db
          token: ${{ secrets.MOMO_DB_READ_TOKEN || github.token }}
          sparse-checkout: drizzle
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install 3.14
        timeout-minutes: 3

      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq5 \
            libleptonica-dev \
            libtesseract-dev \
            tesseract-ocr \
            tesseract-ocr-eng
        timeout-minutes: 5

      - name: Install dependencies
        run: uv sync --locked --dev
        timeout-minutes: 5

      - name: Format check
        run: uv run ruff format --check .
        timeout-minutes: 2

      - name: Lint check
        run: uv run ruff check .
        timeout-minutes: 2

      - name: Type check
        run: uv run mypy
        timeout-minutes: 5

      - name: Test
        env:
          MOMO_DB_MIGRATIONS_DIR: ../../_deps/momo-db/drizzle
        run: uv run pytest
        timeout-minutes: 10

      - name: Integration test
        env:
          MOMO_DB_MIGRATIONS_DIR: ../../_deps/momo-db/drizzle
        run: uv run pytest -m integration
        timeout-minutes: 15
