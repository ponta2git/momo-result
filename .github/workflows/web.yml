name: web

on:
  workflow_call:
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/api/openapi.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web.yml"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        timeout-minutes: 5
      - run: pnpm --filter web generate:api
        timeout-minutes: 2
      - name: Check generated API types are committed
        run: git diff --exit-code -- apps/web/src/shared/api/generated.ts
        timeout-minutes: 1
      - run: pnpm --filter web format:check
        timeout-minutes: 2
      - run: pnpm --filter web lint
        timeout-minutes: 2
      - run: pnpm --filter web typecheck
        timeout-minutes: 5
      - run: pnpm --filter web test:run
        timeout-minutes: 5
      - name: Coverage report
        run: pnpm --filter web test:coverage:report
        continue-on-error: true
        timeout-minutes: 5
      - name: Summarize coverage
        if: always()
        run: |
          python3 scripts/ci/write-coverage-summary.py web \
            --root . \
            --out coverage-summary/web \
            --allow-missing
          cat coverage-summary/web/summary.md >> "${GITHUB_STEP_SUMMARY}"
        timeout-minutes: 1
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: |
            apps/web/coverage/
            coverage-summary/web/
          if-no-files-found: ignore
          retention-days: 30
      - run: pnpm --filter web build
        timeout-minutes: 5
